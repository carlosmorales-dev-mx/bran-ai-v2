<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bran.ai</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>
    <template id="__bundler_thumbnail" data-bg-color="#b91c3a">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
            <rect width="120" height="80" fill="#b91c3a" />
            <polygon points="60,18 72,25 72,39 60,46 48,39 48,25" fill="white" opacity="0.2" />
            <polygon points="60,26 68,31 68,39 60,44 52,39 52,31" fill="white" opacity="0.5" />
            <rect x="20" y="54" width="30" height="4" rx="2" fill="white" opacity="0.4" />
            <rect x="20" y="62" width="20" height="3" rx="1.5" fill="white" opacity="0.25" />
            <rect x="70" y="54" width="30" height="4" rx="2" fill="white" opacity="0.4" />
            <rect x="70" y="62" width="20" height="3" rx="1.5" fill="white" opacity="0.25" />
        </svg>
    </template>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body,
        #root {
            height: 100%;
            width: 100%;
            overflow: hidden
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #f2f4fb;
            color: #1a1d35;
            -webkit-font-smoothing: antialiased
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: #d0d6f0;
            border-radius: 3px
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-5px)
            }
        }

        @keyframes progress {
            0% {
                width: 15%
            }

            50% {
                width: 75%
            }

            100% {
                width: 15%
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-8px)
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0
            }

            100% {
                background-position: 200% 0
            }
        }

        input::placeholder,
        textarea::placeholder {
            color: #9ba3bf
        }

        input:focus,
        textarea:focus {
            border-color: rgba(185, 28, 58, 0.4) !important;
            box-shadow: 0 0 0 3px rgba(185, 28, 58, 0.08) !important;
            outline: none
        }

        select option {
            background: #fff
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ── TOKENS ────────────────────────────────────────────────────────────────────
        const C = {
            bg: '#f2f4fb', surface: '#ffffff', card: '#ffffff', cardAlt: '#f7f8fe',
            border: '#e4e8f5', borderHi: '#c8d0ec',
            crimson: '#b91c3a', crimsonMid: '#dc2d50', crimsonLight: '#f43f5e',
            crimsonDim: 'rgba(185,28,58,0.08)', crimsonGlow: 'rgba(185,28,58,0.18)',
            blue: '#2d5be3', blueMid: '#4169e8',
            blueDim: 'rgba(45,91,227,0.08)', blueGlow: 'rgba(45,91,227,0.14)',
            yellow: '#c97a06', yellowDim: 'rgba(201,122,6,0.10)',
            green: '#16955a', greenDim: 'rgba(22,149,90,0.09)',
            tx: '#1a1d35', txS: '#5a6180', txM: '#9ba3bf',
            mono: "'DM Mono',monospace",
            shadow: '0 1px 3px rgba(26,29,53,0.07),0 4px 16px rgba(26,29,53,0.05)',
            shadowMd: '0 4px 24px rgba(26,29,53,0.10),0 1px 4px rgba(26,29,53,0.06)',
            shadowLg: '0 12px 48px rgba(26,29,53,0.14),0 2px 8px rgba(26,29,53,0.08)',
        };

        // ── SHARED ────────────────────────────────────────────────────────────────────
        const IS = {
            background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9,
            padding: '11px 14px', color: C.tx, fontSize: 13, fontFamily: 'Space Grotesk',
            outline: 'none', width: '100%', transition: 'border-color 0.2s,box-shadow 0.2s',
        };

        function Spinner({ size = 16, color = C.crimson }) {
            return <svg width={size} height={size} viewBox="0 0 16 16" fill="none"
                style={{ animation: 'spin 0.8s linear infinite', display: 'block', flexShrink: 0 }}>
                <circle cx="8" cy="8" r="6" stroke="#e0e4f0" strokeWidth="2" />
                <path d="M8 2A6 6 0 0114 8" stroke={color} strokeWidth="2" strokeLinecap="round" />
            </svg>;
        }

        function Logo({ white = false, size = 1 }) {
            const textColor = white ? '#fff' : C.tx;
            const dotColor = white ? 'rgba(255,255,255,0.7)' : C.crimson;
            return <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                <div style={{
                    width: 32 * size, height: 32 * size, borderRadius: 9 * size, background: C.crimson,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    boxShadow: `0 4px 16px ${C.crimsonGlow}`
                }}>
                    <svg width={15 * size} height={15 * size} viewBox="0 0 14 14" fill="none">
                        <path d="M7 1L12 4V10L7 13L2 10V4L7 1Z" fill="white" opacity="0.95" />
                        <path d="M7 5L9.5 6.5V9.5L7 11L4.5 9.5V6.5L7 5Z" fill={C.crimson} />
                    </svg>
                </div>
                <span style={{ fontSize: 17 * size, fontWeight: 700, color: textColor, letterSpacing: '-0.02em' }}>
                    bran<span style={{ color: dotColor }}>.ai</span>
                </span>
            </div>;
        }

        function Badge({ color, label, dot = true }) {
            return <span style={{
                display: 'inline-flex', alignItems: 'center', gap: 5,
                background: color + '18', color, fontSize: 11, fontWeight: 600,
                borderRadius: 6, padding: '3px 9px', fontFamily: C.mono
            }}>
                {dot && <span style={{
                    width: 5, height: 5, borderRadius: '50%', background: color,
                    boxShadow: `0 0 5px ${color}80`
                }} />}
                {label}
            </span>;
        }

        // ── MOCK DATA ─────────────────────────────────────────────────────────────────
        const SESSIONS = [
            { id: 's1', title: 'Dieta para diabetes tipo 2', project: 'Vanessa Nutrióloga', ts: '14:31', tokens: 2840, cost: 0.0031, msgs: 8 },
            { id: 's2', title: 'Cotización salón 200 personas', project: 'Salón Eventos GDL', ts: '13:55', tokens: 1420, cost: 0.0015, msgs: 5 },
            { id: 's3', title: 'Propiedades Zona Diamante', project: 'Inmobiliaria Mar Azul', ts: '12:10', tokens: 3200, cost: 0.0035, msgs: 11 },
            { id: 's4', title: 'Limpieza dental preventiva', project: 'Clínica Dental CDMX', ts: '11:30', tokens: 980, cost: 0.0010, msgs: 4 },
            { id: 's5', title: 'Tallas Nike Air Max', project: 'E-commerce Shoes MX', ts: '10:45', tokens: 650, cost: 0.0007, msgs: 3 },
            { id: 's6', title: 'Plan alimentación semanal', project: 'Vanessa Nutrióloga', ts: 'Ayer', tokens: 4100, cost: 0.0044, msgs: 14 },
        ];
        const DOCS = [
            { id: 'd1', name: 'Manual Nutrición Clínica.pdf', size: '4.2 MB', chunks: 342, status: 'indexed', ts: 'Apr 28', type: 'pdf', color: C.crimson },
            { id: 'd2', name: 'Catálogo Salón 2026.pdf', size: '2.1 MB', chunks: 180, status: 'indexed', ts: 'Apr 27', type: 'pdf', color: C.blue },
            { id: 'd3', name: 'Listado Propiedades Q2.xlsx', size: '890 KB', chunks: 97, status: 'indexed', ts: 'Apr 25', type: 'file', color: C.yellow },
            { id: 'd4', name: 'Protocolos Dentales.pdf', size: '1.4 MB', chunks: 210, status: 'processing', ts: 'Apr 29', type: 'pdf', color: C.crimson },
            { id: 'd5', name: 'https://vanessa-nutri.com/guia', size: '—', chunks: 0, status: 'processing', ts: 'Apr 29', type: 'url', color: C.blue },
            { id: 'd6', name: 'intro-bran-ai-demo.mp4', size: '38 MB', chunks: 62, status: 'indexed', ts: 'Apr 22', type: 'video', color: C.crimsonMid },
            { id: 'd7', name: 'foto-menu-nutricion.jpg', size: '1.2 MB', chunks: 12, status: 'indexed', ts: 'Apr 21', type: 'image', color: C.green },
        ];
        const CHAT_MSGS = [
            { role: 'user', text: '¿Cuál es la dieta recomendada para un paciente con diabetes tipo 2 y sobrepeso?' },
            { role: 'assistant', text: 'Para un paciente con diabetes tipo 2 y sobrepeso, el protocolo recomendado incluye una dieta hipocalórica moderada con control estricto de carbohidratos de índice glucémico alto. Se sugiere un déficit de 500–750 kcal/día y una distribución de macronutrientes de 40% CHO / 30% proteína / 30% grasa.' },
            { role: 'user', text: '¿Qué alimentos deben evitarse completamente?' },
            { role: 'assistant', text: 'Los alimentos a evitar incluyen: azúcares refinados, harinas blancas, bebidas azucaradas, frituras y alimentos ultraprocesados. El índice glucémico debe mantenerse por debajo de 55 en cada comida.' },
            { role: 'user', text: '¿Cada cuánto tiempo debe revisarse el plan?' },
            { role: 'assistant', text: 'El plan debe revisarse cada 4 semanas durante los primeros 3 meses, y posteriormente cada 8 semanas si los niveles de HbA1c están dentro del rango objetivo (< 7%).' },
        ];
        const days30 = Array.from({ length: 30 }, (_, i) => Math.round(80000 + i * 8000 + (Math.random() - 0.5) * 20000));
        const costs30 = days30.map(t => +(t / 1000000 * 1.1).toFixed(4));

        // ══════════════════════════════════════════════════════════════════════════════
        // AUTH SCREENS
        // ══════════════════════════════════════════════════════════════════════════════
        function AuthScreen({ onLogin }) {
            const [mode, setMode] = useState('login'); // 'login' | 'register'
            const [role, setRole] = useState('admin');
            const [form, setForm] = useState({ name: '', email: 'dev@bran.ai', password: '', confirm: '', org: '' });
            const [loading, setLoading] = useState(false);
            const [errors, setErrors] = useState({});
            const [step, setStep] = useState(0); // for register multi-step feel

            const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

            const validate = () => {
                const e = {};
                if (mode === 'register') {
                    if (!form.name.trim()) e.name = 'Nombre requerido';
                    if (!form.email.includes('@')) e.email = 'Email inválido';
                    if (form.password.length < 6) e.password = 'Mínimo 6 caracteres';
                    if (form.password !== form.confirm) e.confirm = 'Las contraseñas no coinciden';
                } else {
                    if (!form.email) e.email = 'Requerido';
                    if (!form.password) e.password = 'Requerido';
                }
                setErrors(e);
                return Object.keys(e).length === 0;
            };

            const submit = () => {
                if (!validate()) return;
                setLoading(true);
                setTimeout(() => { setLoading(false); onLogin(role); }, 1200);
            };

            // Geometric decoration nodes
            const nodes = [
                { x: '12%', y: '18%', r: 5, o: 0.6 }, { x: '88%', y: '12%', r: 8, o: 0.4 },
                { x: '6%', y: '72%', r: 4, o: 0.5 }, { x: '94%', y: '68%', r: 6, o: 0.35 },
                { x: '50%', y: '8%', r: 3, o: 0.4 }, { x: '22%', y: '88%', r: 7, o: 0.3 },
                { x: '78%', y: '90%', r: 4, o: 0.45 }, { x: '35%', y: '5%', r: 2, o: 0.5 },
            ];

            return (
                <div style={{ height: '100vh', width: '100vw', display: 'flex', overflow: 'hidden', position: 'relative' }}>
                    {/* Left panel — crimson brand */}
                    <div style={{
                        width: '45%', flexShrink: 0,
                        background: `linear-gradient(150deg, #7f0a1e 0%, ${C.crimson} 45%, #e03258 100%)`,
                        display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
                        padding: '48px 52px', position: 'relative', overflow: 'hidden',
                    }}>
                        {/* Geometric lines */}
                        <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', opacity: 0.08 }} viewBox="0 0 600 900" preserveAspectRatio="xMidYMid slice">
                            <line x1="0" y1="300" x2="600" y2="100" stroke="white" strokeWidth="1" />
                            <line x1="0" y1="500" x2="600" y2="300" stroke="white" strokeWidth="1" />
                            <line x1="0" y1="700" x2="600" y2="500" stroke="white" strokeWidth="1" />
                            <line x1="200" y1="0" x2="200" y2="900" stroke="white" strokeWidth="0.5" />
                            <line x1="400" y1="0" x2="400" y2="900" stroke="white" strokeWidth="0.5" />
                            <circle cx="300" cy="450" r="200" stroke="white" strokeWidth="0.5" fill="none" />
                            <circle cx="300" cy="450" r="120" stroke="white" strokeWidth="0.5" fill="none" />
                            <circle cx="300" cy="450" r="40" stroke="white" strokeWidth="1" fill="none" />
                        </svg>
                        {/* Floating nodes */}
                        {nodes.map((n, i) => <div key={i} style={{
                            position: 'absolute', left: n.x, top: n.y,
                            width: n.r * 2, height: n.r * 2, borderRadius: '50%',
                            background: 'rgba(255,255,255,' + n.o + ')',
                            animation: `float ${3 + i * 0.4}s ease-in-out ${i * 0.3}s infinite`,
                        }} />)}

                        {/* Top */}
                        <div style={{ position: 'relative', zIndex: 1 }}>
                            <Logo white size={1} />
                        </div>

                        {/* Center — hero copy */}
                        <div style={{ position: 'relative', zIndex: 1 }}>
                            <div style={{
                                width: 64, height: 64, borderRadius: 16,
                                background: 'rgba(255,255,255,0.15)', backdropFilter: 'blur(8px)',
                                border: '1px solid rgba(255,255,255,0.25)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                marginBottom: 28, boxShadow: '0 8px 32px rgba(0,0,0,0.2)',
                            }}>
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 2L20 7V17L12 22L4 17V7L12 2Z" fill="white" opacity="0.3" />
                                    <path d="M12 2L20 7V17L12 22L4 17V7L12 2Z" stroke="white" strokeWidth="1.5" />
                                    <path d="M12 8L16 10.5V15.5L12 18L8 15.5V10.5L12 8Z" fill="white" opacity="0.6" />
                                </svg>
                            </div>
                            <h1 style={{ fontSize: 34, fontWeight: 700, color: '#fff', lineHeight: 1.18, letterSpacing: '-0.03em', marginBottom: 18 }}>
                                El cerebro central<br />de tu IA empresarial.
                            </h1>
                            <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.72)', lineHeight: 1.75, maxWidth: 340 }}>
                                Plataforma BaaS con RAG, gestión de sesiones y monitoreo de consumo en tiempo real. Múltiples proyectos, un solo panel.
                            </p>

                            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginTop: 36 }}>
                                {[
                                    { icon: '🧠', text: 'RAG sobre PDF, video, imagen, URL y texto' },
                                    { icon: '💬', text: 'Chat por sesión con trazabilidad completa' },
                                    { icon: '📊', text: 'Dashboard de costos y latencia en vivo' },
                                    { icon: '🔐', text: 'Roles: administrador y cliente separados' },
                                ].map((f, i) => <div key={i} style={{
                                    display: 'flex', alignItems: 'center', gap: 12,
                                    animation: `fadeUp 0.4s ease ${0.1 + i * 0.08}s both`
                                }}>
                                    <span style={{ fontSize: 16, flexShrink: 0 }}>{f.icon}</span>
                                    <span style={{ fontSize: 13, color: 'rgba(255,255,255,0.78)', fontWeight: 400 }}>{f.text}</span>
                                </div>)}
                            </div>
                        </div>

                        {/* Bottom */}
                        <div style={{ position: 'relative', zIndex: 1 }}>
                            <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)' }}>v1.4.2 · Acapulco, MX · © 2026 Bran.ai</p>
                        </div>
                    </div>

                    {/* Right panel — form */}
                    <div style={{
                        flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
                        background: '#fafbff', padding: '40px', overflowY: 'auto'
                    }}>
                        <div style={{ width: '100%', maxWidth: 420, animation: 'fadeUp 0.35s ease both' }}>

                            <h2 style={{ fontSize: 24, fontWeight: 700, color: C.tx, marginBottom: 6 }}>
                                {mode === 'login' ? 'Bienvenido de nuevo 👋' : 'Crea tu cuenta'}
                            </h2>
                            <p style={{ fontSize: 13, color: C.txS, marginBottom: 28 }}>
                                {mode === 'login' ? 'Ingresa tus credenciales para continuar' : 'Completa el formulario para empezar'}
                            </p>

                            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                                {mode === 'register' && <Field label="Nombre completo" error={errors.name}>
                                    <input value={form.name} onChange={e => set('name', e.target.value)}
                                        placeholder="Ana García" style={{ ...IS }} />
                                </Field>}

                                <Field label="Correo electrónico" error={errors.email}>
                                    <input value={form.email} onChange={e => set('email', e.target.value)}
                                        placeholder="correo@empresa.com" style={{ ...IS }} />
                                </Field>

                                {mode === 'register' && <Field label="Organización" error={errors.org}>
                                    <input value={form.org} onChange={e => set('org', e.target.value)}
                                        placeholder="Mi Empresa S.A. de C.V." style={{ ...IS }} />
                                </Field>}

                                <Field label="Contraseña" error={errors.password}>
                                    <input type="password" value={form.password} onChange={e => set('password', e.target.value)}
                                        placeholder="••••••••" style={{ ...IS }}
                                        onKeyDown={e => e.key === 'Enter' && !errors.confirm && submit()} />
                                </Field>

                                {mode === 'register' && <Field label="Confirmar contraseña" error={errors.confirm}>
                                    <input type="password" value={form.confirm} onChange={e => set('confirm', e.target.value)}
                                        placeholder="••••••••" style={{ ...IS }}
                                        onKeyDown={e => e.key === 'Enter' && submit()} />
                                </Field>}

                                <button onClick={submit} disabled={loading} style={{
                                    background: C.crimson, color: '#fff', border: 'none', borderRadius: 10,
                                    padding: '13px', fontSize: 14, fontWeight: 700, cursor: loading ? 'default' : 'pointer',
                                    fontFamily: 'Space Grotesk', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9,
                                    boxShadow: `0 4px 18px ${C.crimsonGlow}`,
                                    opacity: loading ? 0.8 : 1, transition: 'opacity 0.15s,transform 0.1s',
                                    marginTop: 4,
                                }}
                                    onMouseEnter={e => { if (!loading) e.currentTarget.style.transform = 'translateY(-1px)'; }}
                                    onMouseLeave={e => e.currentTarget.style.transform = 'none'}>
                                    {loading ? <><Spinner size={16} color="#fff" />
                                        {mode === 'login' ? 'Autenticando…' : 'Creando cuenta…'}</>
                                        : mode === 'login' ? 'Iniciar sesión →' : 'Crear cuenta →'}
                                </button>

                                {mode === 'login' && <div style={{ textAlign: 'center' }}>
                                    <span style={{ fontSize: 12, color: C.txM }}>¿Olvidaste tu contraseña? </span>
                                    <span style={{ fontSize: 12, color: C.crimson, cursor: 'pointer', fontWeight: 500 }}>Recuperar</span>
                                </div>}

                                {/* Toggle mode link */}
                                <div style={{ textAlign: 'center', paddingTop: 4 }}>
                                    {mode === 'login'
                                        ? <p style={{ fontSize: 13, color: C.txS }}>
                                            ¿Aún no tienes cuenta?{' '}
                                            <span onClick={() => { setMode('register'); setErrors({}); }} style={{ color: C.crimson, fontWeight: 600, cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: 3 }}>
                                                Crear una
                                            </span>
                                        </p>
                                        : <p style={{ fontSize: 13, color: C.txS }}>
                                            ¿Ya tienes cuenta?{' '}
                                            <span onClick={() => { setMode('login'); setErrors({}); }} style={{ color: C.crimson, fontWeight: 600, cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: 3 }}>
                                                Iniciar sesión
                                            </span>
                                        </p>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Field({ label, error, children }) {
            return <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <label style={{ fontSize: 12, color: C.txS, fontWeight: 500 }}>{label}</label>
                {children}
                {error && <p style={{ fontSize: 11, color: C.crimson, fontWeight: 500 }}>{error}</p>}
            </div>;
        }

        // ══════════════════════════════════════════════════════════════════════════════
        // ADMIN PANEL
        // ══════════════════════════════════════════════════════════════════════════════
        const NAV = [
            {
                id: 'dashboard', en: 'Dashboard', es: 'Panel',
                icon: <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity="0.8" /><rect x="8.5" y="1" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity="0.8" /><rect x="1" y="8.5" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity="0.8" /><rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity="0.3" /></svg>
            },

        function Spark({ data, color, w = 80, h = 32 }) {
            if (!data || data.length < 2) return null;
            const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
            const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * (h - 4) - 2}`).join(' ');
            const uid = color.replace('#', '');
            return <svg width={w} height={h} style={{ display: 'block' }}>
                <defs><linearGradient id={`sg${uid}`} x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={color} stopOpacity="0.25" />
                    <stop offset="100%" stopColor={color} stopOpacity="0" />
                </linearGradient></defs>
                <polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#sg${uid})`} />
                <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
            </svg>;
        }
        function BarChart({ data, color, h = 100 }) {
            const max = Math.max(...data);
            return <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2.5, height: h }}>
                {data.map((v, i) => <div key={i} style={{
                    flex: 1, background: color, height: `${(v / max) * 100}%`,
                    borderRadius: '3px 3px 0 0', opacity: 0.2 + (i / data.length) * 0.8
                }} />)}
            </div>;
        }

        // ── ADMIN CHAT ────────────────────────────────────────────────────────────────
        function AdminChatScreen({ lang }) {
            const es = lang === 'es';
            const [sessions, setSessions] = useState(SESSIONS);
            const [activeId, setActiveId] = useState('s1');
            const [messages, setMessages] = useState(CHAT_MSGS);
            const [input, setInput] = useState('');
            const [typing, setTyping] = useState(false);
            const bottomRef = useRef();
            const active = sessions.find(s => s.id === activeId);

            useEffect(() => {
                const el = bottomRef.current?.parentElement;
                if (el) el.scrollTop = el.scrollHeight;
            }, [messages, typing]);

            const send = () => {
                if (!input.trim() || typing) return;
                const txt = input; setInput('');
                setMessages(m => [...m, { role: 'user', text: txt }]);
                setTyping(true);
                setTimeout(() => {
                    setMessages(m => [...m, { role: 'assistant', text: es ? 'Basado en los documentos indexados en tu base de conocimiento, aquí tienes una respuesta fundamentada con el contenido más relevante encontrado.' : 'Based on your indexed knowledge base, here is a grounded answer using the most relevant content found.' }]);
                    setTyping(false);
                    setSessions(ss => ss.map(s => s.id === activeId ? { ...s, msgs: s.msgs + 2, tokens: s.tokens + Math.floor(Math.random() * 500 + 200) } : s));
                }, 1800);
            };

            return <div style={{ display: 'flex', height: '100%', overflow: 'hidden' }}>
                {/* Sessions list */}
                <div style={{ width: 256, flexShrink: 0, borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column', background: C.surface }}>
                    <div style={{ padding: '12px', borderBottom: `1px solid ${C.border}`, background: C.cardAlt }}>
                        <button onClick={() => { const id = `s${Date.now()}`; setSessions(ss => [{ id, title: es ? 'Nueva sesión' : 'New session', project: 'Vanessa Nutrióloga', ts: 'Ahora', tokens: 0, cost: 0, msgs: 0 }, ...ss]); setActiveId(id); setMessages([]); }} style={{
                            width: '100%', background: C.crimson, color: '#fff', border: 'none', borderRadius: 8,
                            padding: '8px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'Space Grotesk',
                            boxShadow: `0 2px 10px ${C.crimsonGlow}`,
                        }}>+ {es ? 'Nueva sesión' : 'New session'}</button>
                    </div>
                    <div style={{ flex: 1, overflowY: 'auto', padding: '8px' }}>
                        {sessions.map(s => {
                            const act = s.id === activeId;
                            return <div key={s.id} onClick={() => { setActiveId(s.id); if (s.id === 's1') setMessages(CHAT_MSGS); else setMessages([]); }} style={{
                                padding: '10px 12px', borderRadius: 8, marginBottom: 4, cursor: 'pointer',
                                background: act ? C.crimsonDim : C.surface, border: `1px solid ${act ? C.crimson + '40' : C.border}`, transition: 'all 0.15s',
                            }}
                                onMouseEnter={e => { if (!act) e.currentTarget.style.background = C.bg; }}
                                onMouseLeave={e => { if (!act) e.currentTarget.style.background = C.surface; }}>
                                <div style={{ fontSize: 12, fontWeight: act ? 600 : 400, color: act ? C.tx : C.txS, marginBottom: 3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.title}</div>
                                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                    <span style={{ fontSize: 10, color: C.txM, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 120 }}>{s.project}</span>
                                    <span style={{ fontSize: 10, color: C.txM, flexShrink: 0 }}>{s.ts}</span>
                                </div>
                                <div style={{ display: 'flex', gap: 8, marginTop: 5 }}>
                                    <span style={{ fontSize: 10, color: C.txM, fontFamily: C.mono }}>{s.msgs} msgs</span>
                                    <span style={{ fontSize: 10, color: C.txM, fontFamily: C.mono }}>{(s.tokens / 1000).toFixed(1)}k tok</span>
                                </div>
                            </div>;
                        })}
                    </div>
                </div>

                {/* Chat */}
                <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: C.bg }}>
                    <div style={{ padding: '12px 24px', borderBottom: `1px solid ${C.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: C.surface, boxShadow: C.shadow, flexShrink: 0 }}>
                        <div>
                            <div style={{ fontSize: 14, fontWeight: 600, color: C.tx }}>{active?.title}</div>
                            <div style={{ fontSize: 11, color: C.txS, marginTop: 2 }}>{active?.project} · gemini-2.5-flash-preview · RAG</div>
                        </div>
                        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                            <Badge color={C.crimson} label="RAG activo" />
                            <span style={{ fontSize: 11, color: C.txM, fontFamily: C.mono, background: C.border, padding: '3px 8px', borderRadius: 6 }}>{active?.tokens.toLocaleString()} tok</span>
                        </div>
                    </div>
                    <ChatMessages messages={messages} typing={typing} bottomRef={bottomRef} lang={lang} />
                    <ChatInput input={input} setInput={setInput} send={send} typing={typing} lang={lang} docsCount={DOCS.filter(d => d.status === 'indexed').length} />
                </div>
            </div>;
        }

                        display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 14px', boxShadow: `0 4px 16px ${C.crimsonGlow}`
                    }}>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L20 7V17L12 22L4 17V7L12 2Z" fill={C.crimson} opacity="0.25" /><path d="M12 2L20 7V17L12 22L4 17V7L12 2Z" stroke={C.crimson} strokeWidth="1.5" /></svg>

                </div>}
                {messages.map((m, i) => <div key={i} style={{ display: 'flex', gap: 10, flexDirection: m.role === 'user' ? 'row-reverse' : 'row' }}>
                    <div style={{
                        width: 30, height: 30, borderRadius: '50%', flexShrink: 0, marginTop: 2,

                        </div>
                    </div>
                </div>)}
                {typing && <div style={{ display: 'flex', gap: 10 }}>
                    <div style={{

                        display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, color: '#fff'

                    <div style={{
                        background: C.surface, border: `1px solid ${C.border}`, borderRadius: '4px 12px 12px 12px',

                    </div>
                </div>}
                <div ref={bottomRef} />
            </div>;
        }

        function ChatInput({ input, setInput, send, typing, lang, docsCount }) {

                <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end' }}>
                    <textarea value={input} onChange={e => setInput(e.target.value)}

                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        transition: 'background 0.2s,box-shadow 0.2s',

                    }}>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 2L7 9M14 2L9.5 14 7 9 2 6.5 14 2z" stroke={input.trim() && !typing ? '#fff' : C.txM} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" /></svg>

                setMessages([{
                    role: 'assistant', text: es

                const el = bottomRef.current?.parentElement;
                if (el) el.scrollTop = el.scrollHeight;

                    setMessages(m => [...m, {

                    padding: '0 24px', boxShadow: C.shadow,
                }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                        <div style={{
                            width: 36, height: 36, borderRadius: 9, background: C.crimson,
                            display: 'flex', alignItems: 'center', justifyContent: 'center',

                                <path d="M7 1L12 4V10L7 13L2 10V4L7 1Z" fill="white" opacity="0.9" />

                            }}
                                onMouseEnter={e => { e.currentTarget.style.borderColor = C.crimson; e.currentTarget.style.color = C.crimson; e.currentTarget.style.background = C.crimsonDim; }}
                                onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.color = C.txS; e.currentTarget.style.background = C.surface; }}>
                                {q}
                            </button>)}
                        </div>
                    </div>}

                    {typing && <div style={{ display: 'flex', gap: 10 }}>
                        <div style={{
                            width: 34, height: 34, borderRadius: '50%', background: `linear-gradient(135deg,${C.crimson},${C.crimsonMid})`,
                            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, color: '#fff'
                        }}>B</div>
                        <div style={{
                            background: C.surface, border: `1px solid ${C.border}`, borderRadius: '4px 16px 16px 16px',
                            padding: '15px 18px', display: 'flex', gap: 5, alignItems: 'center', boxShadow: C.shadow
                        }}>
                            {[0, 1, 2].map(i => <span key={i} style={{ width: 7, height: 7, borderRadius: '50%', background: C.crimson, animation: `bounce 1s ${i * 0.2}s infinite` }} />)}
                        </div>
                    </div>}
                    <div ref={bottomRef} />
                </div>

                {/* Input */}
                <div style={{ background: C.surface, borderTop: `1px solid ${C.border}`, padding: '16px 24px', boxShadow: '0 -2px 12px rgba(26,29,53,0.06)' }}>
                    <div style={{ maxWidth: 760, margin: '0 auto', display: 'flex', gap: 10, alignItems: 'flex-end' }}>
                        <textarea value={input} onChange={e => setInput(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
                            placeholder={es ? 'Escribe tu pregunta…' : 'Type your question…'}
                            rows={1} style={{ ...IS, resize: 'none', flex: 1, minHeight: 46, maxHeight: 140, lineHeight: 1.6, padding: '12px 16px', fontSize: 14 }} />
                        <button onClick={send} disabled={!input.trim() || typing} style={{
                            width: 46, height: 46, borderRadius: 11, border: 'none', flexShrink: 0,
                            background: input.trim() && !typing ? C.crimson : C.border,
                            cursor: input.trim() && !typing ? 'pointer' : 'default',
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            transition: 'background 0.2s,box-shadow 0.2s',
                            boxShadow: input.trim() && !typing ? `0 4px 14px ${C.crimsonGlow}` : 'none',
                        }}>
                            <svg width="17" height="17" viewBox="0 0 16 16" fill="none"><path d="M14 2L7 9M14 2L9.5 14 7 9 2 6.5 14 2z" stroke={input.trim() && !typing ? '#fff' : C.txM} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" /></svg>
                        </button>
                    </div>
                    <p style={{ fontSize: 10, color: C.txM, marginTop: 7, textAlign: 'center' }}>{es ? 'Impulsado por' : 'Powered by'} <strong style={{ color: C.crimson }}>bran.ai</strong> · RAG sobre base de conocimiento</p>
                </div>
            </div>;
        }

        // ══════════════════════════════════════════════════════════════════════════════
        // ROOT
        // ══════════════════════════════════════════════════════════════════════════════
        function App() {
            const [view, setView] = useState('auth'); // auth | admin | client
            const [role, setRole] = useState('admin');
            const [screen, setScreen] = useState('dashboard');
            const [lang, setLang] = useState('es');

            if (view === 'auth') return <AuthScreen onLogin={r => { setRole(r); setView(r === 'admin' ? 'admin' : 'client'); }} />;
            if (view === 'client') return <ClientView onLogout={() => setView('auth')} />;

            return <div style={{ display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden' }}>
                <AdminSidebar screen={screen} setScreen={setScreen} lang={lang} setLang={setLang} onLogout={() => setView('auth')} />
                <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
                    <Topbar screen={screen} lang={lang} />
                    <div style={{ flex: 1, overflow: 'hidden' }}>
                        {screen === 'dashboard' && <DashboardScreen lang={lang} />}
                        {screen === 'kb' && <KBScreen lang={lang} />}
                        {screen === 'chat' && <AdminChatScreen lang={lang} />}
                    </div>
                </div>
            </div>;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
